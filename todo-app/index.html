<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List Application</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>📝 My Tasks</h1>
                <p class="date-display" id="dateDisplay"></p>
            </div>
        </header>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Input Section -->
            <section class="input-section">
                <div class="input-group">
                    <input 
                        type="text" 
                        id="taskInput" 
                        class="task-input" 
                        placeholder="Add a new task..."
                        autocomplete="off"
                    >
                    <button id="addBtn" class="add-btn">
                        <span class="btn-text">Add Task</span>
                    </button>
                </div>
                
                <!-- Filter Buttons -->
                <div class="filter-buttons">
                    <button class="filter-btn active" data-filter="all">All</button>
                    <button class="filter-btn" data-filter="active">Active</button>
                    <button class="filter-btn" data-filter="completed">Completed</button>
                </div>
            </section>

            <!-- Stats Section -->
            <section class="stats-section">
                <div class="stat-card">
                    <span class="stat-label">Total Tasks</span>
                    <span class="stat-value" id="totalTasks">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Completed</span>
                    <span class="stat-value completed" id="completedTasks">0</span>
                </div>
                <div class="stat-card">
                    <span class="stat-label">Remaining</span>
                    <span class="stat-value active" id="remainingTasks">0</span>
                </div>
            </section>

            <!-- Tasks List -->
            <section class="tasks-section">
                <ul class="tasks-list" id="tasksList"></ul>
                <div class="empty-state" id="emptyState">
                    <span class="empty-icon">✓</span>
                    <p>No tasks yet. Add one to get started!</p>
                </div>
            </section>

            <!-- Action Buttons -->
            <section class="actions-section">
                <button id="clearCompletedBtn" class="action-btn clear-btn">
                    Clear Completed
                </button>
                <button id="deleteAllBtn" class="action-btn delete-btn">
                    Delete All
                </button>
            </section>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>&copy; 2026 To-Do List App | Built with ❤️</p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
